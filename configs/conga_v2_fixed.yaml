# SASRec-RoPE Configuration (matching code/src training setup)
# This config replicates the training from code/src/main.py
# Best results: Test NDCG@10: 0.5548, HR@10: 0.7896 (FP32, epoch 380)

seed: 42
device: cuda
use_amp: false  # Set to false for stable metrics (FP32 training)
experiment_name: sasrec_rope_ml1m

data:
  dataset: ml-1m
  data_dir: data
  max_seq_len: 50
  train_batch_size: 256
  eval_batch_size: 256
  num_workers: 2

model:
  model_name: sasrec_rope
  hidden_size: 64
  num_layers: 2
  num_heads: 1  # code/src uses 1 head
  dropout_rate: 0.2

training:
  epochs: 400
  learning_rate: 0.001
  weight_decay: 0.01
  optimizer: adamw
  scheduler: cosine
  warmup_steps: 0  # code/src doesn't use warmup
  gradient_clip: 1.0
  
  loss_type: bce
  num_negatives: 1
  
  eval_interval: 20  # Evaluate every 20 epochs (matching code/src)
  early_stopping_patience: 20  # 20 evals = 400 epochs patience
  
  save_dir: experiments/checkpoints/sasrec_rope_ml1m
  log_dir: experiments/logs/sasrec_rope_ml1m
