# CONGA v3 Configuration
# Enhanced with RoPE and modern improvements (GELU, custom attention)
# Optimized for single-task training with better gradient flow

seed: 42
device: cuda
use_amp: true
experiment_name: conga_v3

data:
  dataset: ml-1m
  data_dir: data
  max_seq_len: 50
  train_batch_size: 256
  eval_batch_size: 256
  num_workers: 2

model:
  model_name: conga_v3
  hidden_size: 64
  num_layers: 2
  num_heads: 2
  dropout_rate: 0.3
  
  # Nested Graph Architecture
  num_local_layers: 1
  num_global_layers: 1
  memory_bank_size: 500
  
  # Multi-scale Contrastive Learning
  contrastive_weight: 0.3
  graph_cl_weight: 0.3
  temperature: 0.07

training:
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.01
  optimizer: adamw
  scheduler: cosine
  warmup_steps: 500
  gradient_clip: 1.0
  
  loss_type: bce
  num_negatives: 1
  
  eval_interval: 5
  early_stopping_patience: 20
  
  save_dir: experiments/checkpoints/conga_v3
  log_dir: experiments/logs/conga_v3
