# CONGA Default Configuration

seed: 42
device: cuda
use_amp: true
experiment_name: default

data:
  dataset: ml-1m
  data_dir: data
  max_seq_len: 50
  min_seq_len: 5
  train_batch_size: 256
  eval_batch_size: 256
  num_workers: 4

model:
  model_name: sasrec
  hidden_size: 64
  num_layers: 2
  num_heads: 1
  dropout_rate: 0.2
  
  # Graph settings
  use_graph: false
  graph_layers: 2
  graph_type: gcn
  
  # Contrastive learning
  use_contrastive: false
  contrastive_weight: 0.1
  temperature: 0.07
  augmentation_types:
    - crop
    - mask
    - reorder
  
  # Continual learning
  use_continual: false
  memory_size: 1000
  replay_ratio: 0.3
  distillation_weight: 0.5

training:
  epochs: 200
  learning_rate: 0.001
  weight_decay: 0.0
  optimizer: adam
  scheduler: none
  warmup_steps: 0
  gradient_clip: 1.0
  
  # Loss
  loss_type: bce
  num_negatives: 1
  
  # Evaluation
  eval_interval: 10
  early_stopping_patience: 20
  metrics:
    - hr@10
    - ndcg@10
    - mrr
  
  # Checkpointing
  save_dir: experiments/checkpoints
  log_dir: experiments/logs
