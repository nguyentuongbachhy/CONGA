# CONGA Configuration
# Thesis: COntrastive Nested Graph Architecture for Continual Sequential Recommendation

seed: 42
device: cuda
use_amp: true
experiment_name: conga

data:
  dataset: ml-1m
  data_dir: data
  max_seq_len: 50
  train_batch_size: 256
  eval_batch_size: 256
  num_workers: 4

model:
  model_name: conga
  hidden_size: 64
  num_layers: 2
  num_heads: 2
  dropout_rate: 0.2
  
  # Nested Graph Architecture
  use_graph: true
  num_local_layers: 2
  num_global_layers: 1
  memory_bank_size: 1000
  
  # Multi-scale Contrastive Learning
  use_contrastive: true
  contrastive_weight: 0.1
  graph_cl_weight: 0.1
  temperature: 0.07
  augmentation_types:
    - crop
    - mask
    - reorder
  
  # Continual Learning (optional)
  use_continual: false
  memory_size: 10000
  replay_ratio: 0.3
  distillation_weight: 0.5

training:
  epochs: 200
  learning_rate: 0.001
  weight_decay: 0.01
  optimizer: adamw
  scheduler: cosine
  warmup_steps: 100
  gradient_clip: 1.0
  
  loss_type: bce
  num_negatives: 1
  
  eval_interval: 10
  early_stopping_patience: 30
  
  save_dir: experiments/checkpoints/conga
  log_dir: experiments/logs/conga
