# GCL4SR Configuration
# Paper: Enhancing Sequential Recommendation with Graph Contrastive Learning (IJCAI 2022)

seed: 42
device: cuda
use_amp: true
experiment_name: gcl4sr

data:
  dataset: ml-1m
  data_dir: data
  max_seq_len: 50
  train_batch_size: 256
  eval_batch_size: 256
  num_workers: 4

model:
  model_name: gcl4sr
  hidden_size: 64
  num_layers: 2
  num_heads: 1
  dropout_rate: 0.2
  
  # Graph settings
  use_graph: true
  graph_layers: 2
  graph_type: gcn
  graph_dropout: 0.1
  
  # Contrastive learning settings
  use_contrastive: true
  contrastive_weight: 0.1
  temperature: 0.2

training:
  epochs: 200
  learning_rate: 0.001
  weight_decay: 0.0
  optimizer: adam
  scheduler: none
  gradient_clip: 1.0
  
  loss_type: bce
  num_negatives: 1
  
  eval_interval: 20
  early_stopping_patience: 20
  
  save_dir: experiments/checkpoints/gcl4sr
  log_dir: experiments/logs/gcl4sr
