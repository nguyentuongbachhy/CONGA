# CONGA v2 Configuration
# Enhanced version with continual learning improvements

seed: 42
device: cuda
use_amp: true
experiment_name: conga_v2

data:
  dataset: ml-1m
  data_dir: data
  max_seq_len: 50
  train_batch_size: 256
  eval_batch_size: 256
  num_workers: 2

model:
  model_name: conga_v2
  hidden_size: 64
  num_layers: 2
  num_heads: 2
  dropout_rate: 0.2
  
  # Nested Graph Architecture
  use_graph: true
  num_local_layers: 2
  num_global_layers: 1
  memory_bank_size: 1000
  
  # Multi-scale Contrastive Learning
  use_contrastive: true
  contrastive_weight: 0.1
  graph_cl_weight: 0.1
  temperature: 0.07
  augmentation_types:
    - crop
    - mask
    - reorder
  
  # Enhanced Continual Learning (v2 features)
  use_continual: true
  replay_buffer_size: 10000
  replay_ratio: 0.3
  distillation_weight: 0.5
  
  # EWC parameters
  use_ewc: true
  ewc_lambda: 1000.0
  
  # Nested learning parameters
  use_nested_learning: true
  num_experts: 4
  
  # Importance-weighted memory
  importance_alpha: 0.6

training:
  epochs: 200
  learning_rate: 0.001
  weight_decay: 0.01
  optimizer: adamw
  scheduler: cosine
  warmup_steps: 100
  gradient_clip: 1.0
  
  loss_type: bce
  num_negatives: 1
  
  eval_interval: 10
  early_stopping_patience: 30
  
  save_dir: experiments/checkpoints/conga_v2
  log_dir: experiments/logs/conga_v2
